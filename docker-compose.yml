services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trading_tools
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run prisma:generate && npm run dev -w @trading-tools/api"
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/trading_tools
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -w @trading-tools/web"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  postgres-data:
